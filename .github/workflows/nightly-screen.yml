name: Nightly Moat screen
on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
    inputs:
      universe:
        description: "Which universe to screen"
        type: choice
        options: [sp500, all, watchlist]
        default: sp500

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build ticker list and bulk prices
        env:
          SEC_UA: ${{ secrets.SEC_USER_AGENT }}
        run: |
          UNIVERSE="${{ inputs.universe }}"
          UNIVERSE="${UNIVERSE:-sp500}"
          echo "Universe: $UNIVERSE"
          BASE=https://raw.githubusercontent.com/Ate329/top-us-stock-tickers/main/tickers
          curl -sL "$BASE/all.csv" -o all.csv
          echo "ticker,close" > prices.csv
          tail -n +2 all.csv | awk -F, 'BEGIN{OFS=","}{sym=$1; gsub(/[.\/]/,"-",sym); if($3+0>0) print sym,$3}' >> prices.csv
          echo "Prices loaded for $(($(wc -l < prices.csv)-1)) tickers"
          if [ "$UNIVERSE" = "sp500" ]; then
            curl -sL "$BASE/sp500.csv" -o sp500.csv
            tail -n +2 sp500.csv | awk -F, '{sym=$1; gsub(/[.\/]/,"-",sym); print sym}' > screen_list.txt
          elif [ "$UNIVERSE" = "all" ]; then
            tail -n +2 all.csv | awk -F, '{sym=$1; gsub(/[.\/]/,"-",sym); print sym}' > screen_list.txt
          else
            cp watchlist.txt screen_list.txt
          fi
          echo "Screening $(grep -vc '^#' screen_list.txt) tickers"

      - name: Run screen
        env:
          SEC_UA: ${{ secrets.SEC_USER_AGENT }}
        run: |
          mkdir -p public
          python -m moat.screen \
            --tickers screen_list.txt \
            --prices prices.csv \
            --user-agent "$SEC_UA" \
            --out public/results.json \
            --stamp "$(date -u +%Y-%m-%dT%H:%MZ)"

      - name: Commit results
        run: |
          git config user.name "moat-bot"
          git config user.email "moat-bot@users.noreply.github.com"
          git add public/results.json
          git commit -m "nightly screen $(date -u +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase --autostash origin main
          git push
